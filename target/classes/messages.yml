# --- Сообщения команд ---
command:
  no-permission: <red>У тебя нет прав на эту команду.</red>
  player-only: <red>Эта команда только для игроков.</red>
  reload-success: <green>Конфигурация успешно перезагружена!</green>
  reload-fail: <red>Ошибка при перезагрузке конфигурации. Проверь консоль.</red>
  unlock-success: <green>Неделя <yellow>%week%</yellow> открыта для <yellow>%player%</yellow>!</green>
  unlock-usage: '<red>Использование: /quartasmp unlockweek <weekId> [player]</red>'
  week-not-found: <red>Неделя <yellow>%week%</yellow> не найдена.</red>
  player-not-found: <red>Игрок <yellow>%player%</yellow> не найден.</red>
  setweek-success: '<green>Текущая неделя установлена: <yellow>%week%</yellow> для
    <yellow>%player%</yellow>!</green>'
  setweek-usage: '<red>Использование: /quartasmp setweek <weekId> [player]</red>'
  help-header: <gold>=== QuartaSMP Core Help ===
  help-main: <yellow>/quartasmp</yellow> — открыть главное меню
  help-help: <yellow>/quartasmp help</yellow> — эта справка
  help-reload: <yellow>/quartasmp reload</yellow> — перезагрузить конфиги (admin)
  help-unlockweek: <yellow>/quartasmp unlockweek <weekId> [player]</yellow> — открыть
    неделю (admin)
  help-setweek: <yellow>/quartasmp setweek <weekId> [player]</yellow> — установить
    текущую неделю (admin)
  help-addexp: '<yellow>/quartasmp addexp <amount> [player]</yellow> — добавить опыт (admin)'
  addexp-success: '<green>Добавлено <yellow>%amount%</yellow> опыта для <yellow>%player%</yellow>!</green>'
  addexp-usage: '<red>Использование: /quartasmp addexp <amount> [player]</red>'
  addexp-invalid-amount: <red>Укажи положительное число.</red>

# --- Система уровней ---
level-up:
- ''
- <gradient:#FFD700:#FFA500>⚡ ПОВЫШЕНИЕ УРОВНЯ! ⚡</gradient>
- <gradient:#FFD700:#FFA500>Ты достиг <bold>%level% уровня</bold>!</gradient>
- ''
- <gray>Продолжай выполнять квесты, чтобы прокачаться ещё выше!</gray>
- ''

# --- Система квестов ---
quest:
  week-completed:
  - ''
  - <gradient:#00BFFF:#1E90FF>🎉 Неделя %week% завершена! 🎉</gradient>
  - <gray>Ты получил <yellow>%quest-points% quest-points</yellow> и <yellow>%exp%
    опыта</yellow>!</gray>
  - ''
  task-completed: '<green>Задача выполнена: <yellow>%task%</yellow>!</green>'
  task-progress: '<gray>Прогресс задачи <yellow>%task%</yellow>: <green>%progress%</green>/<yellow>%target%</yellow></gray>'
  week-locked: <red>❌ Эта неделя пока недоступна.</red>
  week-locked-lore: <dark_red>❌ Неделя закрыта</dark_red>
  week-expired: <red>⏰ Время на выполнение недели истекло! Прогресс сброшен.</red>
  no-tasks: <gray>Нет доступных задач</gray>
  
  # Кнопка сдачи предметов (для DELIVER)
  deliver-button-name: <green>✔ Сдать предметы</green>
  deliver-button-lore:
  - <gray>Нажми, чтобы сдать все необходимые предметы</gray>
  - '<gray>Прогресс: <yellow>%progress%</yellow>/<yellow>%target%</yellow></gray>'
  deliver-success: <green>Ты успешно сдал предметы для задачи <yellow>%task%</yellow>!</green>
  deliver-fail: <red>У тебя недостаточно предметов в инвентаре.</red>
  
  # Кнопка проверки (для HAVE_IN_INVENTORY)
