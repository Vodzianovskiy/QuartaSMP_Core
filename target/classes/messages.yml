# ============================================================
# QuartaSMP_Core — Сообщения (все через MiniMessage)
# ============================================================
# Поддерживаются:
#   <gradient:#HEX:#HEX>текст</gradient>
#   <color:#HEX>текст</color>
#   <bold>, <italic>, <underlined>, <strikethrough>
#   <rainbow>, <gold>, <gray>, <dark_gray>, <yellow>, <red>, <green>
#   <newline> — перенос строки
#   Плейсхолдеры: %player%, %level%, %exp%, %task%, %progress%, %target%, %week%, %week_id%, %missing%, %price%, %current%, %item%
#
# ВАЖНО: Тег <prefix> НЕ существует в MiniMessage.
# Префикс добавляется программно через MessagesConfig.prefixed().
# Не используй <prefix> в YAML-строках!

